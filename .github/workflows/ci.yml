name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; CodeQL elevates its own job separately.
permissions:
  contents: read

# A newer push to the same ref cancels in-flight runs (saves Actions minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (guard · typecheck · lint · format · test · build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6 # version is read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ADR-0003: the deterministic core must stay dependency-free.
      - name: Guard — @skervik/core has zero runtime deps
        run: pnpm run check:core-deps

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
